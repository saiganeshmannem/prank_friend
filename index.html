<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Photo Viewer</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      background: #08090c;
      color: white;
    }

    button { font: inherit; }

    .start,
    .prank,
    .reveal {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .start {
      background:
        radial-gradient(circle at 25% 20%, #263764 0, transparent 38%),
        linear-gradient(145deg, #151924, #050608);
      text-align: center;
    }

    .card {
      width: min(420px, 100%);
      padding: 30px;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 24px;
      background: rgba(255,255,255,.07);
      box-shadow: 0 24px 80px rgba(0,0,0,.45);
      backdrop-filter: blur(16px);
    }

    .photo-icon {
      font-size: 58px;
      filter: drop-shadow(0 8px 18px rgba(0,0,0,.35));
    }

    h1 { margin: 12px 0 8px; font-size: 28px; }
    p { margin: 0 0 24px; color: #c4cad8; line-height: 1.5; }

    .primary {
      width: 100%;
      padding: 15px 20px;
      border: 0;
      border-radius: 14px;
      background: #f4f6ff;
      color: #11131a;
      font-weight: 750;
      cursor: pointer;
    }

    .prank {
      display: none;
      background:
        radial-gradient(circle at 50% 46%, rgba(255,255,255,.12), transparent 22%),
        repeating-linear-gradient(135deg, #17191d 0 8px, #101115 8px 16px);
    }

    .prank.active { display: grid; animation: flicker .16s 5; }

    #cracks {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 0 3px #fff) drop-shadow(0 0 11px rgba(112,193,255,.8));
    }

    .warning {
      position: relative;
      z-index: 2;
      padding: 13px 20px;
      border: 1px solid rgba(255,255,255,.35);
      border-radius: 12px;
      background: rgba(0,0,0,.68);
      color: #fff;
      font-size: clamp(18px, 5vw, 34px);
      font-weight: 900;
      letter-spacing: .04em;
      text-align: center;
      animation: pulse .45s infinite alternate;
    }

    .exit {
      position: fixed;
      z-index: 4;
      right: max(14px, env(safe-area-inset-right));
      top: max(14px, env(safe-area-inset-top));
      border: 1px solid rgba(255,255,255,.35);
      border-radius: 999px;
      padding: 9px 13px;
      background: rgba(0,0,0,.62);
      color: white;
      cursor: pointer;
    }

    .reveal {
      display: none;
      z-index: 5;
      background: linear-gradient(145deg, #6835ff, #151b74 55%, #07081a);
      text-align: center;
    }

    .reveal.active { display: grid; }
    .reveal h2 { margin: 0; font-size: clamp(42px, 12vw, 90px); }
    .reveal p { margin-top: 10px; color: #e4ddff; font-size: 20px; }

    @keyframes pulse { to { transform: scale(1.04); color: #ff4e4e; } }
    @keyframes flicker {
      0%, 100% { filter: brightness(1); }
      50% { filter: brightness(2.5); }
    }
  </style>
</head>
<body>
  <main class="start" id="startScreen">
    <section class="card">
      <div class="photo-icon" aria-hidden="true">🖼️</div>
      <h1>You received a photo</h1>
      <p>Tap below to open it in full screen.</p>
      <button class="primary" id="openButton">View photo</button>
    </section>
  </main>

  <section class="prank" id="prankScreen" aria-hidden="true">
    <canvas id="cracks"></canvas>
    <div class="warning">SCREEN DAMAGE DETECTED</div>
    <button class="exit" id="exitButton">Exit prank</button>
  </section>

  <section class="reveal" id="revealScreen" aria-hidden="true">
    <div>
      <h2>😂 Just a prank!</h2>
      <p>Your screen is completely safe.</p>
    </div>
  </section>

  <script>
    const startScreen = document.querySelector("#startScreen");
    const prankScreen = document.querySelector("#prankScreen");
    const revealScreen = document.querySelector("#revealScreen");
    const openButton = document.querySelector("#openButton");
    const exitButton = document.querySelector("#exitButton");
    const canvas = document.querySelector("#cracks");
    let audioContext;
    let revealTimer;

    function drawCracks() {
      const dpr = window.devicePixelRatio || 1;
      canvas.width = innerWidth * dpr;
      canvas.height = innerHeight * dpr;
      const ctx = canvas.getContext("2d");
      ctx.scale(dpr, dpr);
      ctx.clearRect(0, 0, innerWidth, innerHeight);
      ctx.strokeStyle = "rgba(235, 248, 255, .95)";
      ctx.lineWidth = 1.15;

      const centers = [
        [innerWidth * .48, innerHeight * .43],
        [innerWidth * .18, innerHeight * .72]
      ];

      for (const [cx, cy] of centers) {
        for (let ray = 0; ray < 24; ray++) {
          let x = cx;
          let y = cy;
          const angle = (Math.PI * 2 * ray / 24) + Math.random() * .16;
          const length = Math.max(innerWidth, innerHeight) * (.25 + Math.random() * .65);
          ctx.beginPath();
          ctx.moveTo(x, y);

          for (let step = 1; step <= 9; step++) {
            const distance = length * step / 9;
            x = cx + Math.cos(angle) * distance + (Math.random() - .5) * 24;
            y = cy + Math.sin(angle) * distance + (Math.random() - .5) * 24;
            ctx.lineTo(x, y);
          }
          ctx.stroke();
        }
      }
    }

    function playPrankSound() {
      const AudioCtx = window.AudioContext || window.webkitAudioContext;
      if (!AudioCtx) return;

      audioContext = new AudioCtx();
      const now = audioContext.currentTime;
      const gain = audioContext.createGain();
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.13, now + .03);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 2.8);
      gain.connect(audioContext.destination);

      [110, 155, 220].forEach((frequency, index) => {
        const oscillator = audioContext.createOscillator();
        oscillator.type = index === 0 ? "sawtooth" : "square";
        oscillator.frequency.setValueAtTime(frequency, now);
        oscillator.frequency.linearRampToValueAtTime(frequency * 1.35, now + 2.5);
        oscillator.connect(gain);
        oscillator.start(now + index * .04);
        oscillator.stop(now + 2.8);
      });
    }

    async function enterPrank() {
      startScreen.style.display = "none";
      prankScreen.classList.add("active");
      prankScreen.setAttribute("aria-hidden", "false");
      drawCracks();
      playPrankSound();

      if (navigator.vibrate) navigator.vibrate([120, 60, 160]);

      try {
        await document.documentElement.requestFullscreen?.();
      } catch (_) {
        // Some browsers do not allow fullscreen; the prank still works.
      }

      revealTimer = setTimeout(showReveal, 6000);
    }

    function showReveal() {
      clearTimeout(revealTimer);
      audioContext?.close();
      prankScreen.classList.remove("active");
      prankScreen.setAttribute("aria-hidden", "true");
      revealScreen.classList.add("active");
      revealScreen.setAttribute("aria-hidden", "false");
      if (document.fullscreenElement) document.exitFullscreen().catch(() => {});
    }

    openButton.addEventListener("click", enterPrank);
    exitButton.addEventListener("click", showReveal);
    window.addEventListener("resize", drawCracks);
  </script>
</body>
</html>
